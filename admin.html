<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Jacob Teng</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{min-height:100%;background:#f5f5f3;color:#111;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}

#login-screen{position:fixed;inset:0;background:#fff;display:flex;align-items:center;justify-content:center;z-index:9999}
#login-box{width:320px;padding:40px 32px}
#login-box h1{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#111;margin-bottom:32px;font-weight:400}
.field-input{width:100%;border:.5px solid #e0e0e0;border-radius:4px;padding:10px 12px;font-size:13px;font-family:inherit;color:#111;background:#fff;outline:none;resize:vertical}
.field-input:focus{border-color:#111}
#login-box input.field-input{height:42px;margin-bottom:12px;resize:none}
#login-btn{width:100%;height:42px;background:#111;color:#fff;border:none;border-radius:4px;font-size:11px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;font-family:inherit}
#login-btn:hover{background:#333}
#login-err{font-size:11px;color:#e00;margin-top:10px;text-align:center;min-height:16px}

#admin{display:none;min-height:100vh}
#admin-nav{position:sticky;top:0;z-index:100;background:#fff;border-bottom:.5px solid #e0e0e0;display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:52px}
#admin-nav-left{display:flex;align-items:center;gap:20px}
#admin-logo{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#111;font-weight:500}
.anav-tab{font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:#111;opacity:.35;cursor:pointer;background:none;border:none;font-family:inherit;padding:0;transition:opacity .15s}
.anav-tab.on,.anav-tab:hover{opacity:1}
#logout-btn{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:#aaa;cursor:pointer;background:none;border:none;font-family:inherit}
#logout-btn:hover{color:#111}

.gallery-toggle{width:32px;height:18px;border-radius:9px;background:#ddd;position:relative;cursor:pointer;flex-shrink:0;transition:background .2s;border:none;outline:none}
.gallery-toggle::after{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:#fff;top:2px;left:2px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.gallery-toggle.on{background:#111}
.gallery-toggle.on::after{left:16px}
.gallery-card.hidden-gallery{opacity:.45}
#server-status.online{background:#e6f9ee;color:#1a7a40}
#server-status.offline{background:#fff0f0;color:#c00}

.section{display:none;padding:32px 28px 80px;max-width:900px}
.section.active{display:block}
.section-title{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#aaa;margin-bottom:24px}
.card{background:#fff;border:.5px solid #e4e4e4;border-radius:8px;padding:20px 22px;margin-bottom:12px}

.btn{display:inline-flex;align-items:center;gap:6px;height:32px;padding:0 14px;border-radius:4px;font-size:10px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;font-family:inherit;border:none;transition:all .1s}
.btn-dark{background:#111;color:#fff}.btn-dark:hover{background:#333}
.btn-outline{background:#fff;color:#111;border:.5px solid #ddd}.btn-outline:hover{border-color:#111}
.btn-danger{background:#fff;color:#e00;border:.5px solid #fcc}.btn-danger:hover{background:#fff0f0}
.btn-sm{height:26px;padding:0 10px;font-size:9px}

.gallery-card{background:#fff;border:.5px solid #e4e4e4;border-radius:8px;margin-bottom:10px;overflow:hidden}
.gallery-header{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;transition:background .1s}
.gallery-header:hover{background:#f8f8f8}
.gallery-drag-handle{font-size:16px;color:#ccc;cursor:grab;flex-shrink:0;line-height:1}
.gallery-name-input{flex:1;border:none;background:transparent;font-size:12px;letter-spacing:.05em;text-transform:uppercase;color:#111;font-family:inherit;outline:none}
.gallery-name-input:focus{background:#f5f5f3;padding:2px 6px;border-radius:3px;margin:-2px -6px}
.gallery-count{font-size:10px;color:#aaa;flex-shrink:0}
.gallery-chevron{font-size:11px;color:#ccc;transition:transform .2s;flex-shrink:0}
.gallery-card.expanded .gallery-chevron{transform:rotate(180deg)}
.gallery-body{display:none;padding:14px 18px;border-top:.5px solid #f0f0f0}
.gallery-card.expanded .gallery-body{display:block}

.img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:6px;margin-bottom:14px}
.img-tile{position:relative;aspect-ratio:3/2;border-radius:4px;overflow:hidden;background:#f0f0f0}
.img-tile img{width:100%;height:100%;object-fit:cover;display:block}
.img-tile-del{position:absolute;top:4px;right:4px;width:20px;height:20px;background:rgba(0,0,0,.55);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:opacity .15s;font-size:10px;color:#fff;border:none;line-height:1}
.img-tile:hover .img-tile-del{opacity:1}
.img-tile.placeholder{border:.5px dashed #ccc;cursor:pointer;display:flex;align-items:center;justify-content:center;background:#fafafa;position:relative}
.img-tile.placeholder::after{content:'+';font-size:22px;font-weight:200;color:#bbb}
.img-tile.placeholder input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.img-tile.drag-over-tile{outline:2px solid #111}
.gallery-card.sortable-ghost{opacity:.3;background:#eee}

#add-gallery-row{display:flex;align-items:center;gap:10px;padding:14px 0}
#new-gallery-input{flex:1;height:36px;border:.5px solid #e0e0e0;border-radius:4px;padding:0 12px;font-size:12px;font-family:inherit;outline:none;background:#fff;color:#111}
#new-gallery-input:focus{border-color:#111}

.home-opt{display:flex;align-items:center;gap:12px;padding:12px 16px;border:.5px solid #e4e4e4;border-radius:6px;margin-bottom:8px;cursor:pointer;transition:border-color .15s,background .15s}
.home-opt:hover{background:#f8f8f8}
.home-opt.selected{border-color:#111;background:#f8f8f8}
.home-radio{width:14px;height:14px;border-radius:50%;border:.5px solid #ccc;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.home-opt.selected .home-radio{border-color:#111;background:#111}
.home-opt.selected .home-radio::after{content:'';width:5px;height:5px;border-radius:50%;background:#fff}
.home-opt-name{font-size:12px;letter-spacing:.05em;text-transform:uppercase;flex:1}
.home-opt-count{font-size:10px;color:#aaa}

.field-group{margin-bottom:18px}
.field-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#aaa;margin-bottom:7px}
textarea.field-input{min-height:80px;line-height:1.6}

#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#111;color:#fff;font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:10px 20px;border-radius:20px;transition:transform .3s;z-index:9999;pointer-events:none;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0)}

.offline-banner{background:#fff8e6;border:.5px solid #f0d080;border-radius:6px;padding:10px 14px;font-size:11px;color:#7a5800;margin-bottom:20px;display:none}
.offline-banner.show{display:block}

@media(max-width:600px){
  #admin-nav{padding:0 16px}
  .section{padding:24px 16px 60px}
  .img-grid{grid-template-columns:repeat(auto-fill,minmax(80px,1fr))}
}
</style>
</head>
<body>

<div id="login-screen">
  <div id="login-box">
    <h1>Jacob Teng / Admin</h1>
    <input class="field-input" type="password" id="pw-input" placeholder="Password" onkeydown="if(event.key==='Enter')tryLogin()">
    <button id="login-btn" onclick="tryLogin()">Sign in</button>
    <div id="login-err"></div>
  </div>
</div>

<div id="admin">
  <div id="admin-nav">
    <div id="admin-nav-left">
      <span id="admin-logo">Jacob Teng</span>
      <button class="anav-tab on" onclick="showSection('galleries')">Galleries</button>
      <button class="anav-tab"    onclick="showSection('homepage')">Homepage</button>
      <button class="anav-tab"    onclick="showSection('info')">Information</button>
    </div>
    <div style="display:flex;gap:14px;align-items:center">
      <span id="server-status" class="offline">● Offline</span>
      <a href="/" target="_blank" style="font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:#aaa;text-decoration:none">View site ↗</a>
      <button id="logout-btn" onclick="logout()">Sign out</button>
    </div>
  </div>

  <div class="section active" id="sec-galleries">
    <div class="offline-banner" id="offline-banner">Server offline — changes are saved locally and will sync when you restart the server.</div>
    <div class="section-title">Galleries</div>
    <div id="gallery-list"></div>
    <div id="add-gallery-row">
      <input id="new-gallery-input" type="text" placeholder="New gallery name…" onkeydown="if(event.key==='Enter')addGallery()">
      <button class="btn btn-dark" onclick="addGallery()">+ Add gallery</button>
    </div>
  </div>

  <div class="section" id="sec-homepage">
    <div class="section-title">Homepage gallery</div>
    <p style="font-size:12.5px;color:#888;margin-bottom:20px;line-height:1.7">Choose which gallery plays as the homepage slideshow.</p>
    <div id="home-opts"></div>
    <div style="margin-top:20px">
      <button class="btn btn-dark" onclick="saveData()">Save homepage</button>
    </div>
  </div>

  <div class="section" id="sec-info">
    <div class="section-title">Information page</div>
    <div class="card">
      <div class="field-group">
        <div class="field-label">Instagram handle</div>
        <input class="field-input" id="info-ig" type="text" placeholder="@yourhandle">
      </div>
      <div class="field-group">
        <div class="field-label">Instagram URL</div>
        <input class="field-input" id="info-ig-url" type="text">
      </div>
      <div class="field-group">
        <div class="field-label">Email</div>
        <input class="field-input" id="info-email" type="email">
      </div>
      <div class="field-group">
        <div class="field-label">About</div>
        <textarea class="field-input" id="info-about" rows="4"></textarea>
      </div>
      <div class="field-group">
        <div class="field-label">Select Clients</div>
        <textarea class="field-input" id="info-clients" rows="3"></textarea>
      </div>
      <div style="margin-top:4px">
        <button class="btn btn-dark" onclick="saveInfo()">Save information</button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const PASSWORD = 'GeGys7Wb';

const DEFAULT = {
  homepageGallery: 'Jack Stadlman',
  galleries: [
    {title:'Jack Stadlman',             images:['uploads/js1.jpg','uploads/js2.jpg','uploads/js3.jpg','uploads/js4.jpg','uploads/js5.jpg','uploads/js6.jpg','uploads/js7.jpg']},
    {title:'Faves (Ongoing)',            images:['uploads/dv1.jpg','uploads/dv2.jpg','uploads/dv3.jpg','uploads/dv4.jpg']},
    {title:'Los Angeles Grand Prix',     images:[]},
    {title:'Jahsai Sommerville',         images:[]},
    {title:'Soundrunning Track Fest',    images:[]},
    {title:'Jacob Bayla',                images:[]},
    {title:'District Vision',            images:[]},
    {title:'Mahershala Ali – Interview', images:[]},
    {title:'Walt Siegl',                 images:[]},
    {title:'Zion – Jordan Brand',        images:[]},
    {title:'Apex',                       images:[]},
    {title:'Michael Kelly – Interview',  images:[]},
    {title:'Oakville Youth Rodeo',       images:[]},
    {title:'Silver Lining',              images:[]},
  ],
  info:{
    ig:'@jtphoto._',
    igUrl:'https://www.instagram.com/jtphoto._/',
    email:'jacobteng00@gmail.com',
    about:'Documentary and commercial photographer based in Los Angeles.\n\nAvailable for editorial, brand, and personal projects worldwide.',
    clients:'Banditrunning, TheRunnersCentral, Soundrunning, Flotrack, Joopiter, Brooks Running',
  }
};

let DATA = null;
let serverOnline = false;

/* ── Auth ── */
function tryLogin(){
  if(document.getElementById('pw-input').value===PASSWORD){
    sessionStorage.setItem('jt_admin','1');
    document.getElementById('login-screen').style.display='none';
    document.getElementById('admin').style.display='block';
    init();
  } else {
    document.getElementById('login-err').textContent='Incorrect password.';
    document.getElementById('pw-input').value='';
  }
}
function logout(){
  sessionStorage.removeItem('jt_admin');
  location.reload();
}
if(sessionStorage.getItem('jt_admin')==='1'){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('admin').style.display='block';
  init();
}

/* ── Init ── */
async function init(){
  await loadData();
  buildAll();
  checkServerStatus();
  setInterval(checkServerStatus, 5000);
}

/* ── Server status ── */
async function checkServerStatus(){
  try {
    const r = await fetch('/api/data', {signal: AbortSignal.timeout(2000)});
    serverOnline = r.ok;
  } catch {
    serverOnline = false;
  }
  const el = document.getElementById('server-status');
  const banner = document.getElementById('offline-banner');
  if(serverOnline){
    el.textContent = '● Online';
    el.className = 'server-status online';
    banner.classList.remove('show');
  } else {
    el.textContent = '● Offline';
    el.className = 'server-status offline';
    banner.classList.add('show');
  }
}

/* ── Load / Save ── */
async function loadData(){
  /* try server first */
  try {
    const r = await fetch('/api/data', {signal: AbortSignal.timeout(3000)});
    if(r.ok){
      const d = await r.json();
      if(d && d.galleries && d.galleries.length){
        DATA = d;
        localStorage.setItem('jt_admin_data', JSON.stringify(DATA));
        return;
      }
    }
  } catch {}
  /* fall back to localStorage */
  try {
    const local = localStorage.getItem('jt_admin_data');
    if(local) { DATA = JSON.parse(local); return; }
  } catch {}
  /* use defaults */
  DATA = JSON.parse(JSON.stringify(DEFAULT));
}

async function saveData(){
  /* always save to localStorage immediately */
  localStorage.setItem('jt_admin_data', JSON.stringify(DATA));
  /* try to save to server */
  try {
    const r = await fetch('/api/data',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(DATA),
      signal: AbortSignal.timeout(3000)
    });
    if(r.ok){ toast('Saved ✓'); return; }
  } catch {}
  toast('Saved locally — server offline');
}

async function uploadImages(files){
  const form = new FormData();
  Array.from(files).forEach(f=>form.append('file',f,f.name));
  try {
    const r = await fetch('/api/upload',{method:'POST',body:form,signal:AbortSignal.timeout(10000)});
    const d = await r.json();
    return d.files || [];
  } catch {
    /* offline: use blob URLs */
    return Array.from(files).map(f=>URL.createObjectURL(f));
  }
}

/* ── Nav ── */
function showSection(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('sec-'+id).classList.add('active');
  document.querySelectorAll('.anav-tab').forEach((t,i)=>{
    t.classList.toggle('on',['galleries','homepage','info'][i]===id);
  });
  if(id==='homepage') buildHomepageOpts();
}

/* ── Toast ── */
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._tid);
  t._tid=setTimeout(()=>t.classList.remove('show'),2500);
}

/* ── Build ── */
function buildAll(){ buildGalleries(); loadInfo(); }

/* ── Galleries ── */
function buildGalleries(){
  const el=document.getElementById('gallery-list');
  el.innerHTML='';
  DATA.galleries.forEach((g,gi)=>el.appendChild(makeCard(g,gi)));
}

function makeCard(g,gi){
  const card=document.createElement('div');
  card.className='gallery-card'+(g.hidden?' hidden-gallery':'');

  const hd=document.createElement('div');hd.className='gallery-header';
  hd.onclick=e=>{if(e.target.tagName==='INPUT')return;card.classList.toggle('expanded');};

  const handle=document.createElement('span');handle.className='gallery-drag-handle';handle.textContent='⠿';
  const nameInp=document.createElement('input');nameInp.className='gallery-name-input';nameInp.value=g.title;
  nameInp.onclick=e=>e.stopPropagation();
  nameInp.onchange=()=>{g.title=nameInp.value;saveData();};

  const countEl=document.createElement('span');countEl.className='gallery-count';countEl.textContent=`${g.images.length} images`;

  /* visible toggle */
  const toggle=document.createElement('button');
  toggle.className='gallery-toggle'+(g.hidden?'':' on');
  toggle.title=g.hidden?'Hidden — click to show':'Visible — click to hide';
  toggle.onclick=e=>{
    e.stopPropagation();
    g.hidden=!g.hidden;
    toggle.classList.toggle('on',!g.hidden);
    toggle.title=g.hidden?'Hidden — click to show':'Visible — click to hide';
    card.classList.toggle('hidden-gallery',!!g.hidden);
    saveData();
  };

  const chev=document.createElement('span');chev.className='gallery-chevron';chev.textContent='▾';

  hd.appendChild(handle);hd.appendChild(nameInp);hd.appendChild(countEl);hd.appendChild(toggle);hd.appendChild(chev);
  card.appendChild(hd);

  const body=document.createElement('div');body.className='gallery-body';
  const grid=document.createElement('div');grid.className='img-grid';
  rebuildGrid(grid,g,countEl);
  body.appendChild(grid);

  const acts=document.createElement('div');acts.style.cssText='display:flex;gap:8px;flex-wrap:wrap;margin-top:4px';

  const addLabel=document.createElement('label');addLabel.className='btn btn-outline btn-sm';addLabel.style.cursor='pointer';addLabel.textContent='+ Add images';
  const addInp=document.createElement('input');addInp.type='file';addInp.accept='image/*';addInp.multiple=true;addInp.style.display='none';
  addInp.onchange=async e=>{
    toast('Uploading…');
    const paths=await uploadImages(e.target.files);
    g.images.push(...paths);
    rebuildGrid(grid,g,countEl);
    await saveData();
  };
  addLabel.appendChild(addInp);

  const delBtn=document.createElement('button');delBtn.className='btn btn-danger btn-sm';delBtn.textContent='Delete gallery';
  delBtn.onclick=async()=>{
    if(!confirm(`Delete "${g.title}"?`))return;
    const idx=DATA.galleries.findIndex(x=>x.title===g.title);
    if(idx===-1)return;
    DATA.galleries.splice(idx,1);
    if(DATA.homepageGallery===g.title) DATA.homepageGallery=DATA.galleries[0]?.title||'';
    await saveData();
    buildGalleries();
  };

  acts.appendChild(addLabel);acts.appendChild(delBtn);
  body.appendChild(acts);card.appendChild(body);

  /* drag to reorder galleries */
  handle.draggable=true;
  handle.ondragstart=e=>{e.dataTransfer.setData('galIdx',String(gi));card.style.opacity='.4';e.stopPropagation();};
  handle.ondragend=()=>card.style.opacity='';
  card.ondragover=e=>{e.preventDefault();card.classList.add('sortable-ghost');};
  card.ondragleave=()=>card.classList.remove('sortable-ghost');
  card.ondrop=async e=>{
    e.preventDefault();card.classList.remove('sortable-ghost');
    const from=parseInt(e.dataTransfer.getData('galIdx'));
    if(isNaN(from)||from===gi)return;
    const[moved]=DATA.galleries.splice(from,1);
    DATA.galleries.splice(gi,0,moved);
    await saveData();buildGalleries();
  };

  return card;
}

function rebuildGrid(grid,g,countEl){
  grid.innerHTML='';
  g.images.forEach((src,ii)=>{
    const tile=document.createElement('div');tile.className='img-tile';
    tile.draggable=true;
    tile.ondragstart=e=>{e.dataTransfer.setData('imgIdx',String(ii));tile.style.opacity='.4';e.stopPropagation();};
    tile.ondragend=()=>tile.style.opacity='';
    tile.ondragover=e=>{e.preventDefault();e.stopPropagation();tile.classList.add('drag-over-tile');};
    tile.ondragleave=()=>tile.classList.remove('drag-over-tile');
    tile.ondrop=async e=>{
      e.preventDefault();e.stopPropagation();tile.classList.remove('drag-over-tile');
      const from=parseInt(e.dataTransfer.getData('imgIdx'));
      if(isNaN(from)||from===ii)return;
      const[m]=g.images.splice(from,1);g.images.splice(ii,0,m);
      rebuildGrid(grid,g,countEl);await saveData();
    };
    const img=document.createElement('img');img.src=src;img.alt='';img.loading='lazy';
    const del=document.createElement('button');del.className='img-tile-del';del.textContent='✕';
    del.onclick=async e=>{e.stopPropagation();g.images.splice(ii,1);rebuildGrid(grid,g,countEl);await saveData();};
    tile.appendChild(img);tile.appendChild(del);grid.appendChild(tile);
  });
  const ph=document.createElement('div');ph.className='img-tile placeholder';
  const inp=document.createElement('input');inp.type='file';inp.accept='image/*';inp.multiple=true;
  inp.onchange=async e=>{
    toast('Uploading…');
    const paths=await uploadImages(e.target.files);
    g.images.push(...paths);rebuildGrid(grid,g,countEl);await saveData();
  };
  ph.appendChild(inp);grid.appendChild(ph);
  if(countEl)countEl.textContent=`${g.images.length} images`;
}

function addGallery(){
  const inp=document.getElementById('new-gallery-input');
  const name=inp.value.trim();if(!name)return;
  DATA.galleries.push({title:name,images:[]});
  inp.value='';saveData();buildGalleries();
}

/* ── Homepage ── */
function buildHomepageOpts(){
  const el=document.getElementById('home-opts');el.innerHTML='';
  DATA.galleries.forEach(g=>{
    const opt=document.createElement('div');
    opt.className='home-opt'+(DATA.homepageGallery===g.title?' selected':'');
    opt.onclick=()=>{
      DATA.homepageGallery=g.title;
      document.querySelectorAll('.home-opt').forEach(o=>o.classList.remove('selected'));
      opt.classList.add('selected');
    };
    const radio=document.createElement('div');radio.className='home-radio';
    const name=document.createElement('span');name.className='home-opt-name';name.textContent=g.title;
    const cnt=document.createElement('span');cnt.className='home-opt-count';cnt.textContent=`${g.images.length} images`;
    opt.appendChild(radio);opt.appendChild(name);opt.appendChild(cnt);el.appendChild(opt);
  });
}

/* ── Info ── */
function loadInfo(){
  const d=DATA.info||{};
  document.getElementById('info-ig').value=d.ig||'';
  document.getElementById('info-ig-url').value=d.igUrl||'';
  document.getElementById('info-email').value=d.email||'';
  document.getElementById('info-about').value=d.about||'';
  document.getElementById('info-clients').value=d.clients||'';
}
